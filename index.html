<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <!-- displays site properly based on user's device -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">

  <title>Frontend Mentor | Product preview card component</title>
  <style>
    body {
      font-family: "Montserrat", sans-serif;
      font-weight: 500;
      background-color: hsl(30, 38%, 92%);
      color: hsl(212, 21%, 14%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2.5rem 0;
    }

    .card {
      background-color: white;
      border-radius: 0.625rem;
      box-shadow: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.1);
      overflow: hidden;
      max-width: 21.875rem;
      width: 90%;
    }

    .card picture img {
      width: 100%;
      display: block;
    }

    .card__content {
      padding: 1.25rem;
    }

    .card__content__head {
      font-size: 0.875rem;
      letter-spacing: 0.3125rem;
      text-transform: uppercase;
      color: hsl(228, 12%, 48%);
      margin-bottom: 0.625rem;
    }

    .card__content__subhead {
      font-family: "Fraunces", serif;
      font-size: 1.5rem;
      margin-bottom: 0.9375rem;
    }

    .card__content__description {
      font-size: 0.875rem;
      color: hsl(228, 12%, 48%);
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .card__content__price {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .card__content__price__current {
      font-family: "Fraunces", serif;
      font-size: 1.5rem;
      color: hsl(158, 36%, 37%);
      font-weight: 700;
    }

    .card__content__price__original {
      font-size: 0.8125rem;
      color: hsl(228, 12%, 48%);
      text-decoration: line-through;
    }

    .card__content__add-to-cart {
      background-color: hsl(158, 36%, 37%);
      color: white;
      border: none;
      padding: 0.9375rem;
      width: 100%;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card__content__add-to-cart img {
      margin-inline-end: 0.625rem;
    }

    .card__content__add-to-cart:hover {
      background-color: hsl(158, 36%, 30%);
    }



    /* Responsive  */
    @media (min-width: 48rem) {
      .card {
        display: flex;
        max-width: 37.5rem;
      }

      .card picture {
        width: 50%;
      }

      .card picture img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .card__content {
        padding: 1.875rem;
        width: 50%;
      }

      .card__content__description {
        line-height: 1.8;
      }
    }
  </style>
</head>

<body>

  <main class="card">
    <picture>
      <source media="(min-width: 768px)" srcset="images/image-product-desktop.jpg">
      <img src="images/image-product-mobile.jpg" alt="product">
    </picture>
    <div class="card__content">
      <h1 class="card__content__head">Perfume</h1>
      <h2 class="card__content__subhead">Gabrielle Essence Eau De Parfum</h2>
      <p class="card__content__description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.</p>
      <div class="card__content__price">
        <span class="card__content__price__current">$149.99</span>
        <span class="card__content__price__original">$169.99</span>
      </div>
      <button type="button" class="card__content__add-to-cart">
        <img src="./images/icon-cart.svg" alt="Cart icon">
        Add to Cart
      </button>
    </div>
  </main>

</body>

</html>
